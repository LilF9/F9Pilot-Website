<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKD0YM45CW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NKD0YM45CW');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Calculators - F9 Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --f9-green: #008467;
            --f9-dark-green: #005f4a;
            --f9-light-green-bg: #f3f7f6;
            --f9-dark-gray: #1f2937;
            --card-bg: #ffffff;
            --text-muted: #6b7280;
            --input-border: #d1d5db;
            --transition-speed: 0.2s;
            --glass-border: rgba(0, 132, 103, 0.1);
        }

        .dark {
            --f9-light-green-bg: #0f172a;
            --f9-dark-gray: #f3f4f6;
            --f9-green: #10b981; 
            --f9-dark-green: #34d399;
            --card-bg: #1e293b;
            --text-muted: #94a3b8;
            --input-border: #334155;
            --glass-border: rgba(16, 185, 129, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--f9-light-green-bg);
            color: var(--f9-dark-gray);
            transition: background-color var(--transition-speed);
        }

        .calc-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .calc-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--f9-green);
        }

        h2 { color: var(--f9-dark-green); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .badge { font-size: 0.65rem; background: var(--f9-light-green-bg); color: var(--f9-green); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--glass-border); font-weight: 700; }
        
        input[type="time"], select {
            width: 100%; padding: 12px; border: 1px solid var(--input-border); border-radius: 10px;
            background-color: var(--f9-light-green-bg); color: var(--f9-dark-gray); font-size: 1rem;
        }

        .result-box {
            margin-top: 20px; padding: 20px; background-color: var(--f9-light-green-bg);
            border-radius: 12px; border: 2px solid var(--f9-green); display: flex; flex-direction: column; gap: 8px;
        }

        .main-result { font-size: 1.5rem; font-weight: 800; color: var(--f9-green); text-align: center; border-top: 1px solid var(--input-border); padding-top: 10px; margin-top: 10px; }
    </style>
</head>

<body class="p-4 sm:p-8 flex items-center justify-center min-h-screen">
    <div class="container mx-auto max-w-3xl">

        <header class="text-center mb-8 relative">
            <div class="absolute right-0 top-0">
                <button id="theme-toggle" class="p-2 border rounded-lg bg-white dark:bg-slate-800"><span id="theme-icon">🌙</span></button>
            </div>
            <h1 class="text-3xl font-bold text-[#008467] mb-2">Pilot Calculators</h1>
            <p class="text-sm font-medium text-gray-500 mb-4">Stay Ahead of the Game</p>
            <a href="index.html" class="text-sm text-[#008467] font-semibold hover:underline">← Back to Main Page</a>
        </header>

        <div class="calc-card">
            <h2>RSV FDP Calculator <span class="badge">FAR 117</span></h2>
            <div class="grid grid-cols-1 gap-4 mb-4">
                <label class="text-xs font-bold uppercase text-gray-400">Reserve Window</label>
                <select id="rsType" onchange="calcRSV()">
                    <option value="A">RSV A (0300–1330)</option>
                    <option value="B">RSV B (0800–1830)</option>
                    <option value="C">RSV C (1200–2230)</option>
                    <option value="D">RSV D (1700–0000)</option>
                    <option value="E">RSV E (1900–0200)</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                    <label class="text-xs font-bold uppercase text-gray-400 mb-2">FDP Report</label>
                    <input type="time" id="fdpReport" oninput="calcRSV()">
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-bold uppercase text-gray-400 mb-2">Legs</label>
                    <select id="legs" onchange="calcRSV()">
                        <option value="1">1</option><option value="2" selected>2</option>
                        <option value="3">3</option><option value="4">4</option>
                        <option value="5">5</option><option value="6">6</option>
                    </select>
                </div>
            </div>
            <div class="result-box text-sm">
                <div class="flex justify-between"><span>Max Duty Duration:</span> <span id="maxDurationOut" class="font-bold">--</span></div>
                <div class="main-result" id="rsvResult">Input Report Time</div>
            </div>
        </div>

        <footer class="text-center text-gray-400 text-xs mt-12 pb-10">
            &copy; <span id="currentYear"></span> F9 Pilot Hub.
        </footer>
    </div>

    <script>
        function calcRSV() {
            const report = document.getElementById('fdpReport').value;
            const legs = parseInt(document.getElementById('legs').value);
            if (!report) return;
            const [h, m] = report.split(':').map(Number);
            let maxFdp = 12; 
            if (h >= 0 && h < 5) maxFdp = 9;
            else if (h >= 5 && h < 6) maxFdp = 10;
            else if (h >= 6 && h < 7) maxFdp = 11;
            else if (h >= 7 && h < 13) maxFdp = 13;
            else if (h >= 13 && h < 17) maxFdp = 12;
            else if (h >= 17 && h < 24) maxFdp = 11;
            if (legs > 2) maxFdp -= (legs - 2) * 0.5;
            const reportDate = new Date();
            reportDate.setHours(h, m, 0);
            const releaseDate = new Date(reportDate.getTime() + maxFdp * 60 * 60 * 1000);
            const releaseStr = releaseDate.getHours().toString().padStart(2, '0') + ':' + releaseDate.getMinutes().toString().padStart(2, '0');
            document.getElementById('maxDurationOut').textContent = `${maxFdp} hrs`;
            document.getElementById('rsvResult').textContent = `RELEASE BY: ${releaseStr}`;
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
